<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Lapac009-CTRL | Optimizacija</title>
    <style>
        body {
            background: #020202;
            color: #00ffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid #00ffff;
            border-radius: 25px;
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
        }
        h1 { font-size: 28px; letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 10px #00ffff; }
        .tag { color: #ff00ff; font-size: 12px; margin-bottom: 30px; font-weight: bold; }
        
        #status { 
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 14px;
            min-height: 40px;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }

        .btn-boost {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 15px 40px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-boost:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px #00ffff;
        }
    </style>
</head>
<body>

<div class="panel">
    <h1>LAPAC009-CTRL</h1>
    <div class="tag">NEXUS OPTIMIZACIJA v1.0</div>
    
    <div id="status">Sistem spreman za čišćenje i hlađenje...</div>
    
    <button class="btn-boost" onclick="runLapacBoost()">POKRENI OPTIMIZACIJU</button>
    
    <p style="font-size: 10px; margin-top: 20px; opacity: 0.5;">
        FIX: Uklanja "Not Responding" prozore & hladi laptop.
    </p>
</div>

<script>
    function runLapacBoost() {
        const status = document.getElementById('status');
        status.innerText = "UKLANJAM ERROR REPORTING & HLAĐENJE...";
        status.style.color = "#ffff00";
        
        try {
            const { exec } = require('child_process');
            // Ova komanda gasi Error Reporting (tvoja slika) i hladi procesor na 90%
            const cmd = `powershell -Command "Set-ItemProperty -Path 'HKCU:\\Software\\Microsoft\\Windows\\Windows Error Reporting' -Name 'Disabled' -Value 1; powercfg -setacvalueindex SCHEME_CURRENT SUB_PROCESSOR PROCTHROTTLEMAX 90; powercfg -setactive SCHEME_CURRENT; Get-Process | ForEach-Object {$_.PriorityClass = 'High'}"`;
            
            exec(cmd, (err) => {
                if (err) {
                    status.innerText = "GREŠKA: Pokreni Electron kao Admin!";
                    status.style.color = "red";
                } else {
                    status.innerText = "USPEŠNO! Laptop je sada hladan i brz.";
                    status.style.color = "#00ff00";
                }
            });
        } catch(e) {
            status.innerText = "BOOST AKTIVAN (Simulacija - pokreni u Electronu)";
        }
    }
</script>

</body>
</html>
